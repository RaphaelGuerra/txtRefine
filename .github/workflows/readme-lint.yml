name: README Lint

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  markdownlint:
    name: Markdownlint README
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Lint README
        uses: DavidAnson/markdownlint-cli2-action@v20
        with:
          globs: README.md
